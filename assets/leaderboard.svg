<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="868" viewBox="0 0 2000 868" role="img" aria-label="Voice Heist high scores leaderboard">
<title>Voice Heist — High Scores</title>
<desc>A daily high-scores board. Four day cards (Thu Jun 11 marked LATEST, Wed Jun 10, Mon Jun 8 with a top eight, and Sat Jun 6) list players by generated codename and score only — no names or emails are shown.</desc>
<defs>
<radialGradient id="lbGreen" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#13ef93" stop-opacity="0.18"/><stop offset="100%" stop-color="#13ef93" stop-opacity="0"/></radialGradient>
<radialGradient id="lbMagenta" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c026d3" stop-opacity="0.22"/><stop offset="100%" stop-color="#c026d3" stop-opacity="0"/></radialGradient>
<filter id="lbNeon" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="lbSoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
<g id="lbCrown" fill="#f5b942"><path d="M-16,10 L-18,-6 L-9,1 L0,-10 L9,1 L18,-6 L16,10 Z"/><rect x="-16" y="7" width="32" height="6" rx="1.5"/><circle cx="-18" cy="-6" r="2.6"/><circle cx="0" cy="-10" r="2.8"/><circle cx="18" cy="-6" r="2.6"/></g>
</defs>

<rect width="2000" height="868" rx="20" fill="#070f0c"/>
